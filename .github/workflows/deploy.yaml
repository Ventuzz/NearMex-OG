name: CI/CD NearMex Deployment

on:
  push:
    branches: [ "automatización" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar despliegue remoto vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          # Pasamos los secretos como variables de entorno al shell remoto
          envs: REPO_URL,GIT_EMAIL,GIT_NAME,IP_PUBLICA,BUCKET_S3
          script: |
            cd ~/NearMex-OG
            
            # 1. Actualizar el repositorio
            git fetch --all
            git reset --hard origin/automatización
            
            # 2. Crear el archivo de configuración para que el script no pregunte nada
            # Usamos las variables pasadas desde GitHub Secrets
            cat <<EOF > scripts/.deploy_config
            REPO_URL="${{ secrets.REPO_URL }}"
            GIT_EMAIL="${{ secrets.GIT_EMAIL }}"
            GIT_NAME="${{ secrets.GIT_NAME }}"
            IP_PUBLICA="${{ secrets.HOST_IP }}"
            BUCKET_S3="${{ secrets.BUCKET_S3 }}"
            EOF
            
            # 3. Dar permisos y ejecutar
            chmod +x scripts/deploy_nearmex.sh
            bash -l ./scripts/deploy_nearmex.sh
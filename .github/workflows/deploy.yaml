name: CI/CD NearMex Deployment

on:
  push:
    branches: [ "automatización" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar despliegue remoto vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Entrar a la carpeta y actualizar código
            cd ~/NearMex-OG
            git fetch --all
            git reset --hard origin/automatización

            # 2. Asegurar que la carpeta scripts existe y crear el config
            mkdir -p scripts
            
            # Usamos comillas simples para el delimitador de EOF para evitar que el shell remoto 
            # intente interpretar variables antes de tiempo
            cat << 'EOF' > scripts/.deploy_config
            REPO_URL="${{ secrets.REPO_URL }}"
            GIT_EMAIL="${{ secrets.GIT_EMAIL }}"
            GIT_NAME="${{ secrets.GIT_NAME }}"
            IP_PUBLICA="${{ secrets.HOST_IP }}"
            BUCKET_S3="${{ secrets.BUCKET_S3 }}"
            EOF

            # 3. Permisos y ejecución
            chmod +x scripts/deploy_nearmex.sh
            bash -l ./scripts/deploy_nearmex.sh
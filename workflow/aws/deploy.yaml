name: CI/CD NearMex Deployment

on:
  push:
    branches: [ "automatización" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar despliegue remoto vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/NearMex-OG
            git pull origin automatización
            chmod +x deploy_nearmex.sh
            ./deploy_nearmex.sh